    - quantidade
    - sequencia
    type: object
  lancamento.CreateItemsRequest:
    properties:
      itens:
        items:
          $ref: '#/definitions/lancamento.CreateItemRequest'
        minItems: 1
        type: array
    required:
    - itens
    type: object
  lancamento.CreateLancamentoRequest:
    properties:
      dataHora:
        type: string
      finalizado:
        type: boolean
      id_atendente:
        type: integer
      id_comanda:
        type: integer
      id_loja:
        type: integer
      id_mesa:
        type: integer
      observacao:
        type: string
    type: object
  lancamento.UpdateItemRequest:
    properties:
      cancelado:
        type: boolean
      quantidade:
        type: number
    type: object
